name: Update dashboard data

on:
  # GitHub cron läuft in UTC.
  # 04:00/16:00 UTC = 06:00/18:00 in Österreich während Sommerzeit.
  schedule:
    - cron: "0 4,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update market data
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard-data.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update market dashboard data"
          git push
